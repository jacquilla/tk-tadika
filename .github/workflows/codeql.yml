name: "CodeQL Advanced Security Analysis"

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
  schedule:
    - cron: "0 0 * * 0" # Berjalan otomatis setiap hari Minggu jam 12 malam

jobs:
  analyze:
    name: Analyze Code Quality
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: ["javascript-typescript"]

    steps:
      # Upgrade ke v4 resmi yang mendukung Node.js terbaru
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Upgrade ke v4 (Sesuai rekomendasi GitHub Blog 2025/2026)
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality

      # Upgrade ke v4
      - name: Autobuild Code
        uses: github/codeql-action/autobuild@v4

      # Upgrade ke v4
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{matrix.language}}"
