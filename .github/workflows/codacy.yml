# This workflow checks out code, performs a Codacy security scan
# and integrates the results with the GitHub Advanced Security code scanning feature.

name: Codacy Security Scan

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
  schedule:
    - cron: "45 23 * * 3" # Berjalan otomatis seminggu sekali tiap hari Rabu

  # Memungkinkan Anda memicu pemindaian secara manual dari tab Actions
  workflow_dispatch:

permissions:
  contents: read

jobs:
  codacy-security-scan:
    name: Codacy Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read # Wajib bagi actions/checkout untuk mengambil kode
      security-events: write # Wajib bagi upload-sarif untuk menulis hasil ke tab Security
      actions: read # Diperlukan untuk repositori privat agar status Action terbaca

    steps:
      # 1. Checkout kode repositori ke runner
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Jalankan Codacy Analysis CLI untuk menghasilkan file laporan SARIF
      - name: Run Codacy Analysis CLI
        uses: codacy/codacy-analysis-cli-action@d840f886c4bd4edc059706d09c6a1586111c540b
        with:
          # Token repositori dari dashboard Codacy yang disimpan di GitHub Secrets
          project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}
          verbose: true
          output: results.sarif
          format: sarif
          gh-code-scanning-compat: true
          # Memaksa exit code 0 agar proses upload SARIF tidak terhambat jika ada temuan
          max-allowed-issues: 2147483647

      # 3. UPGRADE KE v4: Mengunggah file laporan SARIF ke tab Security GitHub (Bebas dari Warning Kadaluwarsa)
      - name: Upload SARIF results file
        uses: github/codeql-action/upload-sarif@v4
        if: always() # Memastikan hasil scan tetap diunggah ke GitHub walaupun ada isu yang ditemukan
        with:
          sarif_file: results.sarif
